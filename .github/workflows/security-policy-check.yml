name: Security policy check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-files:
    name: Required security files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify required files
        run: |
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f PROMETHEA_GOVERNANCE.md
          test -f .github/ISSUE_TEMPLATE/privacy_check.md

